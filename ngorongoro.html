           <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngorongoro Crater Safari | Aman Safari</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
.header {
  background:#0B3D20;
  color:white;
  text-align:center;
  padding:60px 20px;
}
.section {
  max-width:1000px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

/* BUTTON */
.btn {
  background:#D4AF37;
  padding:12px;
  border:none;
  color:#000;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

/* CHAT */
.chat-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0B3D20;
  color:white;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
}

.chat-box {
  position:fixed;
  bottom:80px;
  right:20px;
  width:300px;
  background:white;
  border-radius:10px;
  display:none;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.chat-header {
  background:#0B3D20;
  color:white;
  padding:10px;
  border-radius:10px 10px 0 0;
}

.chat-body {
  padding:10px;
  max-height:300px;
  overflow:auto;
}

.msg {
  background:#eee;
  padding:8px;
  margin:6px 0;
  border-radius:6px;
}

.user {background:#DCF8C6;}

input {
  width:90%;
  padding:8px;
  margin:5px;
}
</style>
</head>

<body>

<div class="header">
<h1>Ngorongoro Crater Safari</h1>
<p>Big 5 in one day</p>
</div>

<div class="section">
<h2>Overview</h2>
<p>See lions, rhinos, elephants in a natural volcanic crater.</p>
<button class="btn">Book Now</button>
</div>

<!-- CHAT -->
<div class="chat-btn" onclick="toggleChat()">💬 Chat AI</div>

<div class="chat-box" id="chatBox">
  <div class="chat-header">Aman AI Assistant</div>

  <div class="chat-body" id="chatBody">
    <div class="msg">Hi 👋 I can help with price, booking, or dates.</div>

    <button onclick="reply('price')">💰 Price</button>
    <button onclick="reply('dates')">📅 Dates</button>
    <button onclick="reply('book')">🧾 Book</button>
  </div>

  <div>
    <input id="userInput" placeholder="Ask something...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
function toggleChat(){
  let box = document.getElementById("chatBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function reply(type){
  let chat = document.getElementById("chatBody");

  let answers = {
    price: "💰 Price starts from $350 per person (all included)",
    dates: "📅 Best time is June–Oct (dry season)",
    book: "🧾 To book, send name + dates + email"
  };

  chat.innerHTML += `<div class='msg user'>${type}</div>`;
  chat.innerHTML += `<div class='msg'>${answers[type]}</div>`;
}

function send(){
  let input = document.getElementById("userInput");
  let chat = document.getElementById("chatBody");

  if(input.value.trim() === "") return;

  chat.innerHTML += `<div class='msg user'>${input.value}</div>`;
  chat.innerHTML += `<div class='msg'>I will help you with that 👍 (Next step: connect API later)</div>`;

  input.value = "";
}
</script>

</body>
</html>
