<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serengeti Safari | Aman Safari Tanzania</title>

<style>
body {margin:0; font-family:Arial; background:#f5f5f5;}

.header {
  background:#0B3D20;
  color:white;
  text-align:center;
  padding:60px 20px;
}

.section {
  max-width:1000px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

.btn {
  background:#D4AF37;
  padding:12px;
  border:none;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

/* CHAT */
.chat-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0B3D20;
  color:white;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
}

.chat-box {
  position:fixed;
  bottom:80px;
  right:20px;
  width:300px;
  background:white;
  border-radius:10px;
  display:none;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.chat-header {
  background:#0B3D20;
  color:white;
  padding:10px;
}

.chat-body {
  padding:10px;
  max-height:300px;
  overflow:auto;
}

.msg {
  background:#eee;
  padding:8px;
  margin:6px 0;
  border-radius:6px;
}

.user {background:#DCF8C6;}

button {margin:3px; padding:8px; cursor:pointer;}

input {
  width:90%;
  padding:8px;
  margin:5px;
}
</style>
</head>

<body>

<div class="header">
<h1>Serengeti National Park</h1>
<p>Home of the Great Migration</p>
</div>

<div class="section">
<h2>Overview</h2>
<p>See 2 million wildebeest, lions, and endless savannah.</p>
<button class="btn">Book Serengeti Safari</button>
</div>

<!-- CHAT -->
<div class="chat-btn" onclick="toggleChat()">💬 Chat AI</div>

<div class="chat-box" id="chatBox">

  <div class="chat-header">Aman AI - Serengeti</div>

  <div class="chat-body" id="chatBody">
    <div class="msg">Hi 👋 I can help with Serengeti prices, migration, and booking.</div>

    <button onclick="reply('price')">💰 Price</button>
    <button onclick="reply('migration')">🦓 Migration</button>
    <button onclick="reply('book')">🧾 Book</button>
  </div>

  <input id="userInput" placeholder="Ask anything...">
  <button onclick="send()">Send</button>

</div>

<script>

function toggleChat(){
  let box = document.getElementById("chatBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function reply(type){

  let chat = document.getElementById("chatBody");

  let answers = {
    price: "💰 Serengeti safari starts from $450 per person per day (all included)",
    migration: "🦓 Best migration is July–October (north Serengeti river crossing)",
    book: "🧾 Send your name + dates + group size to book instantly"
  };

  chat.innerHTML += `<div class='msg user'>${type}</div>`;
  chat.innerHTML += `<div class='msg'>${answers[type]}</div>`;
}

function send(){
  let input = document.getElementById("userInput");
  let chat = document.getElementById("chatBody");

  if(input.value.trim() === "") return;

  chat.innerHTML += `<div class='msg user'>${input.value}</div>`;
  chat.innerHTML += `<div class='msg'>Got it 👍 I will help you with Serengeti info</div>`;

  input.value = "";
}

</script>

</body>
      </html>
